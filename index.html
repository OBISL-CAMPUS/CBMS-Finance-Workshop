                br_q1: "ඔබේ ලාභය රුපියල් මිලියන 2ක් වන විට බැංකු ශේෂය සෘණ රුපියල් මිලියන 2.5ක් නම්, ඔබ සාර්ථකද?",
                br_q2_title: "සාකච්ඡාව #2",
                br_q2: "30% ක සංගත බදු අනුපාතයක් කළමනාකරුවන්ට 'මුදල්' පිළිබඳ ගැටලුවක් වන්නේ ඇයි?",
                br_q3_title: "සාකච්ඡාව #3",
                br_q3: "'මාරක නිම්නය' (Death Valley) ඔබේ වචනවලින් විස්තර කරන්න.",
                br_q4_title: "සාකච්ඡාව #4",
                br_q4: "දින 15කින් මුදල් ලබා ගැනීම සඳහා 10% ක ලාභ ආන්තිකයක් කැප කිරීමට ඔබ සූදානම්ද?",
                br_q5_title: "සාකච්ඡාව #5",
                br_q5: "බැංකු ණයක් මඟින් ආරම්භයේදී ද්‍රවශීලතා ගැටලුවක් සඟවන්නේ කෙසේද?"
            }
        };

        // Icon Assets using SVG
        const IconInsight = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        const IconScale = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h18"/></svg>;
        const IconPAndL = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>;
        const IconSheet = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 9v12"/><path d="M15 9v12"/></svg>;
        const IconFlow = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>;
        const IconCascade = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
        const IconWorkflow = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" /><path d="M7 8h10M7 12h10M7 16h10" /></svg>;
        const IconDiscussion = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>;
        const IconPrint = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>;

        const App = () => {
            // Language state: 'en' (English) or 'si' (Sinhala)
            const [lang, setLang] = useState('en');
            const [activeTab, setActiveTab] = useState('insight');
            
            const [volume, setVolume] = useState(2000);
            const [price, setPrice] = useState(2500);
            const [payDays, setPayDays] = useState(30);
            const [collectDays, setCollectDays] = useState(90);
            const [genChoice, setGenChoice] = useState(null); 

            // Hard constraint helper: Round all calculations to nearest 1,000 for cognitive ease
            const round = (val) => Math.round(val / 1000) * 1000;

            const stats = useMemo(() => {
                const UNIT_COST = 1500;
                const FIXED_RENT = 50000;
                const DELIVERY_VAR = 50; 
                const MARKETING = 25000;
                const INSURANCE = 5000;
                const INITIAL_CAPITAL = 2000000;
                const TAX_RATE = 0.30; // 30% Corporate Tax

                // Income Statement Calculations
                const rev = round(volume * price);
                const cogs = round(volume * UNIT_COST);
                const grossProfit = rev - cogs;
                const logistics = round(volume * DELIVERY_VAR);
                const opex = round(FIXED_RENT + logistics + MARKETING + INSURANCE);
                const ebit = grossProfit - opex;
                const tax = ebit > 0 ? round(ebit * TAX_RATE) : 0;
                const net = ebit - tax;

                // Generator Decision Logic
                let equipVal = genChoice ? 1500000 : 0;
                let loanVal = genChoice === 'loan' ? 1500000 : 0;
                let cashSpentOnEquip = genChoice === 'cash' ? 1500000 : 0;

                // Dynamic Balance Sheet Mapping
                const ar = collectDays <= 30 ? 0 : rev; // If collected within 30 days, AR is 0 on Day 31
                const ap = payDays <= 30 ? 0 : cogs;    // If paid within 30 days, AP is 0 on Day 31
                const taxesPayable = tax;               // Assumed to be accrued but unpaid instantly on month end
                const equity = INITIAL_CAPITAL + net;

                // Day 31 Cash Flow Snapshot
                const cashIn = collectDays <= 30 ? rev : 0;
                const cashOut = (payDays <= 30 ? cogs : 0) + opex; 
                const bankBalance = INITIAL_CAPITAL - cashSpentOnEquip + cashIn - cashOut;

                // Double Entry Guarantee: Assets = Liabilities + Equity
                const totalAssets = bankBalance + ar + equipVal;
                const totalLE = loanVal + ap + taxesPayable + equity;

                return {
                    rev, cogs, grossProfit, logistics, opex, ebit, tax, net,
                    cash: bankBalance, equipment: equipVal, ar, ap, loans: loanVal, taxesPayable, equity, 
                    totalAssets, totalLE, cashSpentOnEquip, cashIn, cashOut,
                    isBankrupt: bankBalance < 0
                };
            }, [volume, price, payDays, collectDays, genChoice]);

            // Dictionary reference
            const s = translations[lang];

            // Render helper for currency
            const formatCurrency = (val) => {
                const prefix = lang === 'en' ? 'LKR ' : 'රු. ';
                if (val < 0) {
                    return `(${prefix}${Math.abs(val).toLocaleString()})`;
                }
                return `${prefix}${val.toLocaleString()}`;
            };

            return (
                <div className={`flex flex-col md:flex-row min-h-screen ${lang === 'si' ? 'font-sinhala' : 'font-sans'}`}>
                    {/* Desktop Sidebar Navigation */}
                    <aside className="sidebar no-print fixed left-0 top-0 h-screen w-24 hidden md:flex flex-col items-center py-8 glass z-50">
                        <div className="mb-8 text-emerald-500 font-black text-2xl tracking-tighter">OB</div>
                        <nav className="flex-1 space-y-4 overflow-y-auto no-scrollbar w-full px-2">
                            <NavBtn icon={<IconInsight />} label={s.tab_insight} active={activeTab === 'insight'} onClick={() => setActiveTab('insight')} />
                            <NavBtn icon={<IconScale />} label={s.tab_equation} active={activeTab === 'equation'} onClick={() => setActiveTab('equation')} />
                            <NavBtn icon={<IconPAndL />} label={s.tab_income} active={activeTab === 'income'} onClick={() => setActiveTab('income')} />
                            <NavBtn icon={<IconSheet />} label={s.tab_balance} active={activeTab === 'balance'} onClick={() => setActiveTab('balance')} />
                            <NavBtn icon={<IconFlow />} label={s.tab_flow} active={activeTab === 'flow'} onClick={() => setActiveTab('flow')} />
                            <NavBtn icon={<IconCascade />} label={s.tab_cascade} active={activeTab === 'cascade'} onClick={() => setActiveTab('cascade')} />
                            <NavBtn icon={<IconWorkflow />} label={s.tab_workflow} active={activeTab === 'workflow'} onClick={() => setActiveTab('workflow')} />
                            <NavBtn icon={<IconDiscussion />} label={s.tab_breakout} active={activeTab === 'breakout'} onClick={() => setActiveTab('breakout')} />
                        </nav>
                        <button onClick={() => window.print()} className="mt-auto p-4 text-slate-400 hover:text-emerald-400 transition-colors">
                            <IconPrint />
                        </button>
                    </aside>

                    {/* Main Content Area */}
                    <div className="flex-1 md:ml-24 flex flex-col min-h-screen">
                        
                        {/* Unified Sticky Header */}
                        <header className="sticky top-0 z-40 glass px-4 md:px-10 py-4 flex flex-col sm:flex-row justify-between items-center no-print gap-4 border-b border-white/5">
                            <div className="text-center sm:text-left">
                                <h1 className="text-xs md:text-sm font-bold tracking-[0.15em] text-emerald-400 uppercase">
                                    {s.title} {s.subtitle}
                                </h1>
                                <p className="text-[10px] text-slate-400 uppercase font-semibold mt-0.5 tracking-wider">
                                    {s.architecture}
                                </p>
                            </div>
                            
                            <div className="flex flex-wrap items-center justify-center gap-4 sm:gap-6">
                                <VitalItem label={s.bankPosition} value={stats.cash} color={stats.isBankrupt ? "text-red-500 animate-pulse" : "text-blue-400"} formatter={formatCurrency} />
                                <VitalItem label={s.netProfit} value={stats.net} color="text-emerald-400" formatter={formatCurrency} />
                                
                                {/* Quick Action buttons: Language and Print */}
                                <div className="flex items-center gap-2 ml-2">
                                    {/* Pure English and Sinhala Toggle */}
                                    <div className="flex bg-slate-900 border border-white/10 rounded-full p-1 shadow-inner">
                                        <button 
                                            onClick={() => setLang('en')} 
                                            className={`px-3 py-1 rounded-full text-[10px] font-bold transition-all ${lang === 'en' ? 'bg-emerald-500 text-white shadow-md' : 'text-slate-400 hover:text-white'}`}
                                        >
                                            EN
                                        </button>
                                        <button 
                                            onClick={() => setLang('si')} 
                                            className={`px-3 py-1 rounded-full text-[10px] font-bold font-sinhala transition-all ${lang === 'si' ? 'bg-emerald-500 text-white shadow-md' : 'text-slate-400 hover:text-white'}`}
                                        >
                                            සිංහල
                                        </button>
                                    </div>

                                    {/* Mobile Print Button */}
                                    <button onClick={() => window.print()} className="md:hidden p-2 bg-slate-900 hover:bg-slate-800 text-slate-300 border border-white/10 rounded-full transition-all">
                                        <IconPrint />
                                    </button>
                                </div>
                            </div>
                        </header>

                        {/* Mobile Swipeable Tab Bar (Scrollable horizontally) */}
                        <div className="md:hidden flex overflow-x-auto whitespace-nowrap space-x-1.5 p-3 bg-slate-950/90 border-b border-white/10 sticky top-[73px] sm:top-[61px] z-30 no-scrollbar no-print">
                            <MobileTabBtn label={s.tab_insight} active={activeTab === 'insight'} onClick={() => setActiveTab('insight')} />
                            <MobileTabBtn label={s.tab_equation} active={activeTab === 'equation'} onClick={() => setActiveTab('equation')} />
                            <MobileTabBtn label={s.tab_income} active={activeTab === 'income'} onClick={() => setActiveTab('income')} />
                            <MobileTabBtn label={s.tab_balance} active={activeTab === 'balance'} onClick={() => setActiveTab('balance')} />
                            <MobileTabBtn label={s.tab_flow} active={activeTab === 'flow'} onClick={() => setActiveTab('flow')} />
                            <MobileTabBtn label={s.tab_cascade} active={activeTab === 'cascade'} onClick={() => setActiveTab('cascade')} />
                            <MobileTabBtn label={s.tab_workflow} active={activeTab === 'workflow'} onClick={() => setActiveTab('workflow')} />
                            <MobileTabBtn label={s.tab_breakout} active={activeTab === 'breakout'} onClick={() => setActiveTab('breakout')} />
                        </div>

                        {/* Screen Content Wrapper */}
                        <div className="p-4 md:p-10 max-w-7xl w-full mx-auto space-y-12 flex-1 pb-12">
                            
                            {/* TAB: INSIGHT */}
                            {activeTab === 'insight' && (
                                <div className="space-y-8 animate-fadeIn">
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <InsightCard title={s.insight_model_title} color="border-emerald-500" desc={s.insight_model_desc} />
                                        <InsightCard title={s.insight_timing_title} color="border-red-500" desc={s.insight_timing_desc} />
                                        <InsightCard title={s.insight_growth_title} color="border-blue-500" desc={s.insight_growth_desc} />
                                    </div>
                                    <div className="glass p-6 md:p-10 rounded-[32px] flex flex-col lg:flex-row items-center gap-10">
                                        <div className="flex-1 space-y-4 text-center lg:text-left">
                                            <h2 className="text-2xl md:text-3xl font-black uppercase tracking-tight text-white">{s.insight_ground_title}</h2>
                                            <p className="text-slate-300 text-sm md:text-base leading-relaxed">{s.insight_ground_desc}</p>
                                        </div>
                                        <div className="w-52 h-52 bg-slate-900 rounded-full border-8 border-slate-800 flex items-center justify-center text-center p-4 shadow-2xl shrink-0">
                                            <span className="text-emerald-500 font-black text-3xl">
                                                40%<br/>
                                                <span className="text-[10px] text-slate-400 uppercase tracking-widest font-sans font-normal block mt-1">{s.insight_gross_margin}</span>
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* TAB: EQUATION */}
                            {activeTab === 'equation' && (
                                <SectionWrapper title={s.eq_case_title} description={s.eq_case_desc}>
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                        <div className="lg:col-span-1 space-y-4">
                                            <div className="card-neo p-6 rounded-3xl space-y-4">
                                                <h3 className="text-emerald-400 font-bold uppercase text-xs tracking-widest border-b border-white/5 pb-2">
                                                    {s.eq_terminal_title}
                                                </h3>
                                                <button 
                                                    onClick={() => setGenChoice('loan')} 
                                                    className={`w-full p-5 rounded-2xl border transition-all text-left ${genChoice === 'loan' ? 'bg-blue-500/20 border-blue-500 shadow-xl' : 'bg-slate-800/40 border-white/10 opacity-70 hover:opacity-100'}`}
                                                >
                                                    <h4 className="font-bold text-sm text-white">{s.eq_dec_a_title}</h4>
                                                    <p className="text-[11px] text-slate-300 mt-2">{s.eq_dec_a_desc}</p>
                                                </button>
                                                <button 
                                                    onClick={() => setGenChoice('cash')} 
                                                    className={`w-full p-5 rounded-2xl border transition-all text-left ${genChoice === 'cash' ? 'bg-emerald-500/20 border-emerald-500 shadow-xl' : 'bg-slate-800/40 border-white/10 opacity-70 hover:opacity-100'}`}
                                                >
                                                    <h4 className="font-bold text-sm text-white">{s.eq_dec_b_title}</h4>
                                                    <p className="text-[11px] text-slate-300 mt-2">{s.eq_dec_b_desc}</p>
                                                </button>
                                            </div>
                                        </div>
                                        
                                        <div className="lg:col-span-2 flex flex-col items-center justify-center space-y-10 card-neo p-8 rounded-3xl">
                                            <div className="relative w-full max-w-md py-4">
                                                <div className="h-3 bg-slate-700 w-full rounded-full relative shadow-inner">
                                                    <div className="absolute left-0 -top-8 text-[10px] font-black text-blue-400 uppercase tracking-widest text-center">
                                                        {s.bal_assets}
                                                    </div>
                                                    <div className="absolute right-0 -top-8 text-[10px] font-black text-emerald-400 uppercase tracking-widest text-center">
                                                        {s.bal_liab_eq}
                                                    </div>
                                                </div>
                                                <div className="flex justify-between mt-8 gap-4">
                                                    <div className="flex-1 h-32 bg-blue-500/10 border-2 border-blue-500/30 rounded-2xl flex flex-col items-center justify-center p-3 shadow-lg">
                                                        <span className="text-xs text-slate-400 mb-1 font-bold">{s.bal_assets}</span>
                                                        <span className="text-lg md:text-xl font-mono font-bold text-blue-400">{formatCurrency(stats.totalAssets)}</span>
                                                    </div>
                                                    <div className="flex-1 h-32 bg-emerald-500/10 border-2 border-emerald-500/30 rounded-2xl flex flex-col items-center justify-center p-3 shadow-lg">
                                                        <span className="text-xs text-slate-400 mb-1 font-bold">{lang === 'en' ? 'L + EQ' : 'වගකීම් + හිමිකම්'}</span>
                                                        <span className="text-lg md:text-xl font-mono font-bold text-emerald-400">{formatCurrency(stats.totalLE)}</span>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="text-center pt-4 border-t border-white/5 w-full">
                                                <p className="text-[10px] text-slate-400 uppercase tracking-[0.2em] font-black">
                                                    {s.eq_status}: <span className={stats.totalAssets === stats.totalLE ? "text-emerald-400" : "text-red-500"}>{stats.totalAssets === stats.totalLE ? s.stable : s.error}</span>
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                </SectionWrapper>
                            )}

                            {/* TAB: INCOME */}
                            {activeTab === 'income' && (
                                <SectionWrapper title={s.inc_case_title} description={s.inc_case_desc}>
                                    <div className="grid grid-cols-1 lg:grid-cols-4 gap-8">
                                        <div className="lg:col-span-1 card-neo p-6 rounded-3xl space-y-8 no-print">
                                            <h3 className="text-emerald-400 font-bold uppercase text-xs tracking-widest border-b border-white/5 pb-2">
                                                {s.inc_controls}
                                            </h3>
                                            <SliderItem label={s.inc_vol_label} value={volume} min={100} max={5000} step={100} onChange={setVolume} />
                                            <SliderItem label={s.inc_price_label} value={price} min={1500} max={5000} step={50} onChange={setPrice} color="bg-blue-500" />
                                        </div>
                                        <div className="lg:col-span-3 card-neo p-6 md:p-10 rounded-[32px] shadow-2xl bg-slate-900/40 border border-white/5">
                                            <header className="border-b border-white/10 pb-6 mb-8 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
                                                <div>
                                                    <h2 className="text-2xl font-bold tracking-tight text-white">{s.inc_stmt_title}</h2>
                                                </div>
                                                <span className="text-[10px] font-mono text-slate-400 bg-slate-800 px-3 py-1 rounded-full uppercase tracking-widest border border-slate-700">
                                                    {s.roundedNote}
                                                </span>
                                            </header>
                                            <div className="space-y-4 max-w-2xl mx-auto">
                                                <DocRow label={s.inc_rev} value={stats.rev} isBold formatter={formatCurrency} />
                                                <DocRow label={s.inc_cogs} value={-stats.cogs} color="text-red-400" formatter={formatCurrency} />
                                                <div className="h-[1px] bg-white/10 my-2"></div>
                                                <DocRow label={s.inc_gp} value={stats.grossProfit} isBold color="text-emerald-400" formatter={formatCurrency} />
                                                
                                                <div className="py-4 space-y-3 border-y border-white/5 my-6">
                                                    <SectionHeader label={s.inc_opex} />
                                                    <DocRow label={s.inc_rent} value={-50000} formatter={formatCurrency} />
                                                    <DocRow label={s.inc_delivery} value={-stats.logistics} formatter={formatCurrency} />
                                                    <DocRow label={s.inc_marketing} value={-25000} formatter={formatCurrency} />
                                                    <DocRow label={s.inc_insurance} value={-5000} formatter={formatCurrency} />
                                                </div>
                                                
                                                <div className="pt-4 space-y-3">
                                                    <DocRow label={s.inc_ebit} value={stats.ebit} isBold formatter={formatCurrency} />
                                                    <DocRow label={s.inc_tax} value={-stats.tax} color="text-red-400" formatter={formatCurrency} />
                                                    <div className="p-4 md:p-6 bg-emerald-500/10 rounded-2xl mt-4 border border-emerald-500/20 shadow-inner">
                                                        <DocRow label={s.inc_net} value={stats.net} isLarge isBold color="text-emerald-400" formatter={formatCurrency} />
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </SectionWrapper>
                            )}

                            {/* TAB: BALANCE VIEW */}
                            {activeTab === 'balance' && (
                                <SectionWrapper title={s.bal_case_title} description={s.bal_case_desc}>
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                        
                                        {/* Assets Column */}
                                        <div className="card-neo p-6 md:p-10 rounded-[32px] border-t-4 border-t-blue-500 shadow-xl border border-white/5">
                                            <h3 className="text-blue-400 font-black uppercase text-xs tracking-widest border-b border-white/5 pb-4 mb-6">
                                                {s.bal_assets}
                                            </h3>
                                            
                                            <div className="space-y-6">
                                                <SectionHeader label={s.bal_curr_assets} />
                                                <DocRow label={s.bal_cash} value={stats.cash} formatter={formatCurrency} />
                                                <DocRow label={s.bal_ar} value={stats.ar} color="text-orange-400" formatter={formatCurrency} />
                                                
                                                <div className="pt-4">
                                                    <SectionHeader label={s.bal_non_curr_assets} />
                                                    <DocRow label={s.bal_fixed} value={stats.equipment} formatter={formatCurrency} />
                                                </div>
                                                
                                                <div className="pt-6 border-t border-white/10">
                                                    <DocRow label={s.bal_total_assets} value={stats.totalAssets} isBold isLarge color="text-blue-400" formatter={formatCurrency} />
                                                </div>
                                            </div>
                                        </div>

                                        {/* Liabilities & Equity Column */}
                                        <div className="card-neo p-6 md:p-10 rounded-[32px] border-t-4 border-t-emerald-500 shadow-xl border border-white/5">
                                            <h3 className="text-emerald-400 font-black uppercase text-xs tracking-widest border-b border-white/5 pb-4 mb-6">
                                                {s.bal_liab_eq}
                                            </h3>
                                            
                                            <div className="space-y-6">
                                                <SectionHeader label={s.bal_curr_liab} />
                                                <DocRow label={s.bal_ap} value={stats.ap} color="text-red-400" formatter={formatCurrency} />
                                                <DocRow label={s.bal_taxes_payable} value={stats.taxesPayable} color="text-red-400" formatter={formatCurrency} />
                                                <DocRow label={s.bal_loans} value={stats.loans} formatter={formatCurrency} />
                                                
                                                <div className="pt-4">
                                                    <SectionHeader label={s.bal_equity} />
                                                    <DocRow label={s.bal_capital} value={2000000} formatter={formatCurrency} />
                                                    <DocRow label={s.bal_retained} value={stats.net} color="text-emerald-400" formatter={formatCurrency} />
                                                </div>
                                                
                                                <div className="pt-6 border-t border-white/10">
                                                    <DocRow label={s.bal_total_le} value={stats.totalLE} isBold isLarge color="text-emerald-400" formatter={formatCurrency} />
                                                </div>
                                            </div>
                                        </div>

                                    </div>
                                </SectionWrapper>
                            )}

                            {/* TAB: CASH REALITY */}
                            {activeTab === 'flow' && (
                                <SectionWrapper title={s.flow_case_title} description={s.flow_case_desc}>
                                    <div className="grid grid-cols-1 lg:grid-cols-4 gap-8">
                                        <div className="lg:col-span-1 card-neo p-6 rounded-3xl space-y-8 no-print">
                                            <h3 className="text-blue-400 font-bold uppercase text-xs tracking-widest border-b border-white/5 pb-2">
                                                {s.flow_controls}
                                            </h3>
                                            <SliderItem label={s.flow_col_label} value={collectDays} min={0} max={120} step={15} onChange={setCollectDays} color="bg-orange-500" />
                                            <SliderItem label={s.flow_pay_label} value={payDays} min={0} max={120} step={15} onChange={setPayDays} color="bg-purple-500" />
                                            
                                            {/* Dynamic Suggestive Tip Panel */}
                                            <div className={`p-5 rounded-2xl border transition-all text-xs leading-relaxed ${stats.isBankrupt ? 'alert-pulse border-red-500/50 text-red-300' : 'bg-emerald-500/10 border-emerald-500/30 text-emerald-300'}`}>
                                                <h4 className="font-bold uppercase text-[10px] mb-2 text-white">{s.flow_status_title}</h4>
                                                <p>{stats.isBankrupt ? s.flow_tip_bankrupt : s.flow_tip_solvent}</p>
                                            </div>
                                        </div>
                                        <div className="lg:col-span-3 card-neo p-6 md:p-10 rounded-[32px] border-t-8 border-t-orange-500 shadow-2xl border border-white/5">
                                            <header className="border-b border-white/10 pb-6 mb-8">
                                                <h2 className="text-2xl font-bold text-orange-400 tracking-tight">{s.flow_stmt_title}</h2>
                                            </header>
                                            <div className="space-y-5 max-w-2xl mx-auto">
                                                <DocRow label={s.flow_open_cash} value={2000000} formatter={formatCurrency} />
                                                <DocRow label={s.flow_equip} value={-stats.cashSpentOnEquip} color="text-slate-400" formatter={formatCurrency} />
                                                
                                                <div className="h-[1px] bg-white/5 my-2"></div>
                                                
                                                <DocRow label={s.flow_cash_in} value={stats.cashIn} color="text-emerald-400" formatter={formatCurrency} />
                                                <DocRow label={s.flow_cash_out_op} value={-stats.opex} color="text-red-400" formatter={formatCurrency} />
                                                <DocRow label={s.flow_cash_out_pub} value={payDays <= 30 ? -stats.cogs : 0} color="text-red-400" formatter={formatCurrency} />
                                                
                                                <div className={`p-6 md:p-8 rounded-3xl mt-8 transition-all border shadow-xl ${stats.isBankrupt ? 'bg-red-500/20 border-red-500' : 'bg-emerald-500/10 border-emerald-500/30'}`}>
                                                    <DocRow label={s.flow_net_bank} value={stats.cash} isLarge isBold color={stats.isBankrupt ? 'text-red-500' : 'text-emerald-400'} sub={s.actualMoney} formatter={formatCurrency} />
                                                    {stats.isBankrupt && (
                                                        <p className="text-center text-[10px] text-red-400 uppercase tracking-widest mt-4 font-bold animate-bounce">
                                                            {s.liquidityCrisis}
                                                        </p>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </SectionWrapper>
                            )}

                            {/* TAB: THE CASCADE */}
                            {activeTab === 'cascade' && (
                                <div className="space-y-8 animate-fadeIn">
                                    <div className="glass p-6 md:p-8 rounded-[32px] border-l-8 border-emerald-500">
                                        <h2 className="text-lg md:text-xl font-bold uppercase tracking-wider text-emerald-400 mb-2">{s.tab_cascade}</h2>
                                        <p className="text-slate-300 text-sm">{s.cas_desc}</p>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <CascadeCard level={s.cas_strategy} title={s.cas_card1_title} color="border-emerald-500" desc={s.cas_card1_desc} />
                                        <CascadeCard level={s.cas_metric} title={s.cas_card2_title} color="border-blue-500" desc={s.cas_card2_desc} />
                                        <CascadeCard level={s.cas_outcome} title={s.cas_card3_title} color="border-red-500" desc={stats.isBankrupt ? s.cas_card3_desc_bankrupt : s.cas_card3_desc_solvent} />
                                    </div>
                                </div>
                            )}

                            {/* TAB: WORKFLOW SIM */}
                            {activeTab === 'workflow' && (
                                <div className="space-y-8 animate-fadeIn">
                                    <div className="glass p-6 md:p-8 rounded-[32px] border-l-8 border-blue-500">
                                        <h2 className="text-lg md:text-xl font-bold uppercase tracking-wider text-blue-400 mb-2">{s.wf_title}</h2>
                                        <p className="text-slate-300 text-sm">{s.wf_desc}</p>
                                    </div>
                                    <div className="glass p-6 md:p-10 rounded-[32px] flex flex-col md:flex-row items-center justify-around gap-6 min-h-[300px]">
                                        <WorkflowBox label={s.wf_order} active />
                                        <div className="text-slate-500 font-bold text-2xl rotate-90 md:rotate-0">→</div>
                                        <WorkflowBox label={s.wf_cogs} alert={stats.payDays <= 30} />
                                        <div className="text-slate-500 font-bold text-2xl rotate-90 md:rotate-0">→</div>
                                        <WorkflowBox label={s.wf_cash} success={stats.collectDays <= 30} />
                                    </div>
                                </div>
                            )}

                            {/* TAB: BREAKOUT QUESTIONS */}
                            {activeTab === 'breakout' && (
                                <div className="space-y-8 animate-fadeIn">
                                    <div className="glass p-6 md:p-8 rounded-[32px] border-l-8 border-purple-500">
                                        <h2 className="text-lg md:text-xl font-bold uppercase tracking-wider text-purple-400 mb-2">{s.br_title}</h2>
                                        <p className="text-slate-300 text-sm">{s.br_desc}</p>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <BreakoutItem n="1" tag={s.br_q1_title} q={s.br_q1} />
                                        <BreakoutItem n="2" tag={s.br_q2_title} q={s.br_q2} />
                                        <BreakoutItem n="3" tag={s.br_q3_title} q={s.br_q3} />
                                        <BreakoutItem n="4" tag={s.br_q4_title} q={s.br_q4} />
                                        <BreakoutItem n="5" tag={s.br_q5_title} q={s.br_q5} />
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        };

        // Layout Helper Components
        const SectionWrapper = ({ title, description, children }) => (
            <div className="space-y-8 animate-fadeIn">
                <div className="glass p-6 md:p-8 rounded-[32px] border-l-8 border-emerald-500 shadow-xl">
                    <h2 className="text-lg md:text-xl font-bold uppercase tracking-wider text-emerald-400 mb-2">{title}</h2>
                    <p className="text-slate-300 text-xs md:text-sm leading-relaxed max-w-5xl">{description}</p>
                </div>
                {children}
            </div>
        );

        const NavBtn = ({ icon, label, active, onClick }) => (
            <button 
                onClick={onClick} 
                className={`group relative w-full p-4 rounded-xl flex flex-col items-center justify-center transition-all ${active ? 'bg-emerald-500 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'}`}
            >
                {icon}
                <span className="text-[9px] font-bold uppercase tracking-tighter mt-2 text-center break-words max-w-full">
                    {label}
                </span>
            </button>
        );

        const MobileTabBtn = ({ label, active, onClick }) => (
            <button 
                onClick={onClick} 
                className={`px-4 py-2 rounded-full text-xs font-bold transition-all shrink-0 ${active ? 'bg-emerald-500 text-white shadow-md' : 'bg-slate-900 text-slate-400 border border-white/5'}`}
            >
                {label}
            </button>
        );

        const VitalItem = ({ label, value, color, formatter }) => (
            <div className="text-right">
                <p className="text-[8px] text-slate-500 font-bold tracking-wider">{label}</p>
                <p className={`text-xs md:text-sm font-mono font-bold ${color}`}>{formatter(value)}</p>
            </div>
        );

        const DocRow = ({ label, value, color = "text-slate-200", isBold = false, isLarge = false, sub, formatter }) => (
            <div className="flex justify-between items-start py-0.5">
                <div>
                    <p className={`text-[11px] uppercase tracking-wide ${isBold ? 'font-bold' : 'font-medium'} ${color}`}>{label}</p>
                    {sub && <p className="text-[10px] text-slate-500 font-medium italic mt-0.5">{sub}</p>}
                </div>
                <div className={`font-mono text-right ${isLarge ? 'text-xl md:text-2xl' : 'text-xs md:text-sm'} ${isBold ? 'font-black' : 'font-bold'} ${color}`}>
                    {formatter(value)}
                </div>
            </div>
        );

        const SectionHeader = ({ label }) => (
            <p className="text-[9px] font-black text-slate-500 uppercase border-b border-white/5 pb-1 tracking-[0.25em] mb-3">{label}</p>
        );

        const SliderItem = ({ label, value, min, max, step, onChange, color = "bg-emerald-500" }) => (
            <div className="space-y-3">
                <div className="flex justify-between items-end">
                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wide">{label}</label>
                    <span className="text-xs font-mono font-bold text-white">{value.toLocaleString()}</span>
                </div>
                <input 
                    type="range" 
                    min={min} 
                    max={max} 
                    step={step} 
                    value={value} 
                    onChange={e => onChange(Number(e.target.value))} 
                    className={`w-full h-1.5 rounded-lg appearance-none cursor-pointer accent-white ${color} shadow-lg`} 
                />
            </div>
        );

        const InsightCard = ({ title, desc, color }) => (
            <div className={`glass p-6 rounded-3xl border-l-4 ${color} space-y-2`}>
                <h4 className="text-xs font-bold text-white tracking-wider uppercase">{title}</h4>
                <p className="text-xs text-slate-300 leading-relaxed">{desc}</p>
            </div>
        );

        const CascadeCard = ({ level, title, color, desc }) => (
            <div className={`card-neo p-6 rounded-3xl border-l-8 ${color} space-y-3`}>
                <p className="text-[9px] font-black text-slate-500 uppercase">{level}</p>
                <h4 className="font-bold text-sm text-white">{title}</h4>
                <p className="text-xs text-slate-300 leading-relaxed">{desc}</p>
            </div>
        );

        const WorkflowBox = ({ label, active, alert, success }) => {
            let styleClasses = "border-slate-800 text-slate-500";
            if (alert) styleClasses = "border-red-500 bg-red-500/10 text-red-400";
            else if (success) styleClasses = "border-emerald-500 bg-emerald-500/10 text-emerald-400";
            else if (active) styleClasses = "border-blue-500 bg-blue-500/10 text-blue-400";

            return (
                <div className={`w-36 h-36 rounded-3xl flex flex-col items-center justify-center p-4 text-center border-2 transition-all shadow-xl ${styleClasses}`}>
                    <span className="text-xs font-bold uppercase tracking-wider">{label}</span>
                </div>
            );
        };

        const BreakoutItem = ({ n, tag, q }) => (
            <div className="glass p-6 rounded-2xl border-l-4 border-emerald-500 hover:border-blue-500 transition-all shadow-lg space-y-3">
                <p className="text-emerald-500 font-bold text-[9px] uppercase tracking-wider border-b border-white/5 pb-2">
                    {tag}
                </p>
                <p className="text-xs md:text-sm leading-relaxed font-semibold text-slate-200">{q}</p>
            </div>
        );

        // Initiate React Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
